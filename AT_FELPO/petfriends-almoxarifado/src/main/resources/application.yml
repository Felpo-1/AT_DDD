server:
  port: 8081

spring:
  application:
    name: petfriends-almoxarifado
  datasource:
    url: jdbc:h2:mem:almoxarifadodb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        processarPedido-in-0:
          destination: pedido-enviado
          group: almoxarifado-group
          binder: rabbit
        despacharPedido-out-0:
          destination: pedido-despachado
          binder: rabbit
      rabbit:
        bindings:
          processarPedido-in-0:
            consumer:
              bindingRoutingKey: '#'
          despacharPedido-out-0:
            producer:
              routingKeyExpression: "''"

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "*"
