server:
  port: 8082

spring:
  application:
    name: petfriends-transporte
  datasource:
    url: jdbc:h2:mem:transportedb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        processarDespacho-in-0:
          destination: pedido-despachado
          group: transporte-group
          binder: rabbit
      rabbit:
        bindings:
          processarDespacho-in-0:
            consumer:
              bindingRoutingKey: '#'

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "*"
